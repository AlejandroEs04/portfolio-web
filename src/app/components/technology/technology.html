<div appScrollReveal class="skill-card p-6 rounded-xl border border-ink-800 text-center bg-ink-900/60">

  <div class="text-4xl mb-3">
    <img [src]="getIcon(name())" alt="{{ name() }} icon" class="mx-auto technology-logo" />
  </div>

  <h3 class="font-semibold text-neutral-100">{{ name() }}</h3>
  @if (experience()) {
    <p class="text-sm text-neutral-500 mt-1">{{ experience() }}</p>
  }
</div>
