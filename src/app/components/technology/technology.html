<div class="skill-card p-6 rounded-xl border border-gray-800 text-center animate-on-scroll bg-white">

  <div class="text-4xl mb-3">
    <img [src]="getIcon(name())" alt="{{ name() }} icon" class="mx-auto technology-logo" />
  </div>

  <h3 class="font-semibold">{{ name() }}</h3>
  @if (experience()) {
    <p class="text-sm text-gray-500 mt-1">{{ experience() }}</p>
  }
</div>
