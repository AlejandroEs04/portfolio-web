<section class="py-24 px-4">
  <div class="max-w-5xl mx-auto">
    <h1 class="text-4xl font-bold text-center text-neutral-50">All Projects</h1>
    <div class="w-16 h-1 bg-linear-to-r from-mxpink-500 to-mxviolet-500 mx-auto mt-4 rounded-full"></div>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mt-12">
      @for (project of projects(); track project.id) {
        <app-project
          [name]="project.title"
          [description]="project.description ?? ''"
          [technologies]="project.projectTechnologies.map(pt => pt.technology.name)"
          [id]="project.id.toString()" />
      } @empty {
        <p class="col-span-full text-center text-neutral-500">No projects available at the moment.</p>
      }
    </div>
  </div>
</section>
